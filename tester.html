<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tester Dashboard — Psikotest</title>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<style>
:root {
    --primary: #667eea;
    --purple: #764ba2;
    --bg: #f0f2ff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
    min-height: 100vh;
}

/* ══ LOGIN SCREEN ══ */
#loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}
.login-box {
    background: white;
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}
.login-logo { text-align: center; font-size: 42px; margin-bottom: 8px; }
.login-title { text-align: center; font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.login-sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 28px; }
.login-group { margin-bottom: 16px; }
.login-group label {
    display: block; font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
}
.login-group input {
    width: 100%; padding: 12px 14px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 15px; outline: none; transition: border-color 0.2s; color: var(--text);
}
.login-group input:focus { border-color: var(--primary); }
.login-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--primary), var(--purple));
    color: white; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s; margin-top: 8px;
}
.login-btn:hover:not(:disabled) { opacity: 0.92; }
.login-btn:active:not(:disabled) { transform: scale(0.98); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-err {
    color: #dc2626; font-size: 13px; font-weight: 600;
    text-align: center; margin-top: 12px; min-height: 20px;
}

/* ══ APP SCREEN ══ */
#appScreen { display: none; }

/* ── TOP NAV ── */
.topnav {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding: 0 20px;
    display: flex;
    align-items: center;
    position: sticky; top: 0; z-index: 100;
}
.topnav-brand {
    font-size: 15px; font-weight: 700; color: white;
    padding: 14px 16px 14px 0;
    border-right: 1px solid rgba(255,255,255,0.25);
    margin-right: 6px; white-space: nowrap; flex-shrink: 0;
}
.nav-tab {
    padding: 14px 16px; color: white; font-size: 13px; font-weight: 600;
    border-bottom: 3px solid white; background: rgba(255,255,255,0.12);
}
.nav-user {
    margin-left: auto; display: flex; align-items: center; gap: 10px;
}
.nav-username { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; }
.btn-logout {
    background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.35);
    color: white; font-size: 13px; font-weight: 700;
    padding: 7px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
}
.btn-logout:hover { background: rgba(220,38,38,0.75); border-color: transparent; }

/* ── MAIN ── */
.main { padding: 20px; max-width: 1500px; margin: 0 auto; }

/* ── CARD ── */
.card {
    background: white; border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    padding: 20px; margin-bottom: 18px;
}
.card-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
    padding-bottom: 14px; border-bottom: 2px solid var(--bg);
}
.card-title { font-size: 16px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }

/* ── INFO BAR ── */
.info-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.info-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; }
.pill-blue   { background: #dbeafe; color: #1d4ed8; }
.pill-yellow { background: #fef3c7; color: #d97706; }
.pill-purple { background: #ede9fe; color: #6d28d9; }
.pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #28a745; flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── CONTROLS ── */
.controls-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
.ctrl-input {
    padding: 8px 14px; border: 2px solid var(--border); border-radius: 10px;
    font-size: 14px; font-weight: 600; outline: none; transition: border-color 0.2s;
    background: white; color: var(--text);
}
.ctrl-input:focus { border-color: var(--primary); }

/* ── BUTTONS ── */
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 18px; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--purple)); color: white; }
.btn-primary:hover { opacity: 0.9; }
.btn-warning { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; }
.btn-warning:hover { opacity: 0.9; }
.btn-outline { background: white; color: var(--muted); border: 2px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── DATATABLES ── */
table.dataTable { width: 100% !important; border-collapse: collapse; font-size: 13px; min-width: 500px; }
table.dataTable thead th {
    background: linear-gradient(135deg, var(--primary), var(--purple));
    color: white; padding: 10px 8px; font-weight: 700; border: none; white-space: nowrap;
}
table.dataTable tbody td { padding: 9px 8px; border-bottom: 1px solid #eef0f6; vertical-align: middle; }
table.dataTable tbody tr:hover { background: #f5f7ff; }
table.dataTable tbody tr:nth-child(even) { background: #fafbff; }
.dataTables_wrapper .dataTables_filter input,
.dataTables_wrapper .dataTables_length select {
    border: 2px solid var(--border); border-radius: 8px; padding: 6px 10px; outline: none;
}
.dataTables_wrapper .dataTables_filter input:focus,
.dataTables_wrapper .dataTables_length select:focus { border-color: var(--primary); }
.dataTables_wrapper .dataTables_paginate .paginate_button {
    padding: 6px 12px; margin: 2px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px;
}
.dataTables_wrapper .dataTables_paginate .paginate_button.current {
    background: linear-gradient(135deg, var(--primary), var(--purple)); color: white !important; border: none;
}
.dataTables_wrapper .dataTables_info { font-size: 12px; }
.dataTables_wrapper { overflow-x: auto; }

/* ── TIMER ── */
.timer-live {
    display: inline-block; background: #fff3cd; color: #856404;
    border: 1.5px solid #ffc107; border-radius: 8px; padding: 3px 10px;
    font-weight: 700; font-size: 13px; font-family: 'Courier New', monospace;
    min-width: 72px; text-align: center;
}
.timer-live.danger { background: #f8d7da; color: #842029; border-color: #f5c2c7; animation: blink 1s infinite; }
.timer-live.done   { background: #d1e7dd; color: #0f5132; border-color: #badbcc; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── MISC ── */
.today-date-badge {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: white; font-weight: 700; font-size: 13px; padding: 6px 16px; border-radius: 99px;
}
.loading-block { text-align: center; padding: 50px 20px; color: var(--muted); }
.spinner {
    border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
    border-radius: 50%; width: 40px; height: 40px;
    animation: spin 1s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-msg { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; }
.empty-msg .em-icon { font-size: 48px; margin-bottom: 12px; }
.tooltip-custom {
    position: fixed; background: #1e293b; color: white;
    padding: 8px 12px; border-radius: 8px; font-size: 12px;
    max-width: 300px; word-wrap: break-word;
    z-index: 9999; box-shadow: 0 4px 12px rgba(0,0,0,.3);
    pointer-events: none; display: none;
}
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; cursor: pointer; max-width: 160px; }
.truncate:hover { color: var(--primary); }
@media (max-width: 600px) { .main { padding: 12px 8px; } .card { padding: 14px 12px; } }
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">🧠</div>
        <div class="login-title">Psikotest Tester</div>
        <div class="login-sub">Masuk untuk melihat data peserta</div>
        <div class="login-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Username"
                autocomplete="username" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div class="login-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Password"
                autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">Masuk</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- ══ APP SCREEN ══ -->
<div id="appScreen">
    <nav class="topnav">
        <div class="topnav-brand">🧠 Psikotest</div>
        <div class="nav-tab">📅 Hari Ini</div>
        <div class="nav-user">
            <span class="nav-username" id="navUsername"></span>
            <button class="btn-logout" onclick="doLogout()">⏻ Logout</button>
        </div>
    </nav>

    <div class="main">
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    📅 Peserta Aktif
                    <span class="today-date-badge" id="todayBadgeLabel">Hari Ini</span>
                </div>
                <div class="info-bar">
                    <div class="info-pill pill-blue">
                        <span class="pulse-dot"></span> Auto-refresh 5 detik
                    </div>
                    <span class="info-pill pill-yellow" id="todayCount">0 peserta</span>
                    <span class="info-pill pill-purple" id="todayLastUpdate">-</span>
                    <button class="btn btn-outline btn-sm" onclick="todayRefresh()">🔄 Refresh</button>
                </div>
            </div>
            <div class="controls-bar">
                <label style="font-size:13px;font-weight:700;color:var(--muted)">Tabel:</label>
                <input type="text" class="ctrl-input" id="todayTableInput" value="nilai1" style="width:140px">
                <label style="font-size:13px;font-weight:700;color:var(--muted);margin-left:6px">Tanggal:</label>
                <input type="date" id="todayDateInput" class="ctrl-input">
                <button class="btn btn-warning" onclick="todaySearch()">🔍 Cari</button>
                <a href="https://psikotest.lidan.co.id/" target="_blank" class="btn btn-primary" style="text-decoration:none">🔗 Buka Tes</a>
            </div>
            <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
                💡 Peserta terdeteksi dari tanggal yang otomatis disimpan saat mengisi biodata.
            </p>
            <div id="todayContainer">
                <div class="loading-block"><div class="spinner"></div><p>Memuat data...</p></div>
            </div>
        </div>
    </div>
</div>

<div class="tooltip-custom" id="tooltipEl"></div>

<script>
/* ══════════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════════ */
const API_BASE  = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis7';
const API_LOGIN = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis6';
const AUTH_KEY  = 'admin';
const DATE_PIPE_INDEX = 4;
const SESSION_KEY = 'psikotest_tester_user';

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let rawDataAll = [];
let allInterval = null;
let todayTable  = null;

/* ══════════════════════════════════════════════════════
   LOGIN / LOGOUT
══════════════════════════════════════════════════════ */
async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginErr');
    const btn      = document.getElementById('loginBtn');

    errEl.textContent = '';
    if (!username || !password) {
        errEl.textContent = '⚠ Username dan password wajib diisi.';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Memeriksa...';

    try {
        const res  = await fetch(`${API_LOGIN}?action=login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Custom-Auth': AUTH_KEY,
                'X-Role': 'user'
            },
            body: JSON.stringify({ username, password })
        });
        const json = await res.json();

        if (json.success) {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ username }));
            showApp(username);
        } else {
            errEl.textContent = '❌ ' + (json.message || 'Username atau password salah.');
        }
    } catch(e) {
        errEl.textContent = '⚠ Gagal terhubung ke server. Coba lagi.';
    }

    btn.disabled = false;
    btn.textContent = 'Masuk';
}

function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    if (allInterval) { clearInterval(allInterval); allInterval = null; }
    if (todayTable)  { todayTable.destroy(); todayTable = null; }
    rawDataAll = [];
    document.getElementById('appScreen').style.display   = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginPassword').value       = '';
    document.getElementById('loginErr').textContent      = '';
    document.getElementById('loginUsername').focus();
}

function showApp(username) {
    document.getElementById('loginScreen').style.display  = 'none';
    document.getElementById('appScreen').style.display    = 'block';
    document.getElementById('navUsername').textContent    = '👤 ' + username;
    document.getElementById('todayDateInput').value       = todayString();
    document.getElementById('todayBadgeLabel').textContent = 'Hari Ini';
    startAutoRefresh();
}

function checkSession() {
    try {
        const saved = sessionStorage.getItem(SESSION_KEY);
        if (saved) {
            const { username } = JSON.parse(saved);
            if (username) { showApp(username); return; }
        }
    } catch(e) {}
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display   = 'none';
    setTimeout(() => document.getElementById('loginUsername').focus(), 100);
}

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
function todayString() {
    const d = new Date();
    return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
}
function nowTimeString() {
    return new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function makeTruncate(text, maxLen=30) {
    if (!text) return '';
    const s = String(text);
    if (s.length <= maxLen) return `<span>${escHtml(s)}</span>`;
    return `<span class="truncate" data-full="${escHtml(s)}">${escHtml(s.substring(0,maxLen))}…</span>`;
}
function getDateFromX02(x02) {
    if (!x02) return '';
    return (x02.split('|')[DATE_PIPE_INDEX] || '').trim();
}
function getNamaFromX02(x02) {
    if (!x02) return '';
    return (x02.split('|')[0] || '').split(';')[0].trim();
}
function formatSkor(x05) {
    if (!x05) return '';
    return x05.split('|').map((p,i) => p.trim() ? `v${i+1}` : null).filter(Boolean).join(' ');
}
function renderTimer(idX, x04Raw) {
    if (!x04Raw || !x04Raw.includes('|')) return '<span style="color:#ccc;font-size:12px">—</span>';
    const pipeIdx  = x04Raw.indexOf('|');
    const namaTest = x04Raw.substring(0, pipeIdx);
    const modeStr  = x04Raw.substring(pipeIdx + 1);
    const colonIdx = modeStr.indexOf(':');
    const mode     = modeStr.substring(0, colonIdx);
    const val      = parseInt(modeStr.substring(colonIdx + 1));
    if (isNaN(val)) return '<span style="color:#ccc;font-size:12px">—</span>';
    if (mode === 'COUNTDOWN') {
        if (val <= 0) return `<span class="timer-live done" title="${escHtml(namaTest)}">Habis</span>`;
        const m = String(Math.floor(val/60)).padStart(2,'0');
        const s = String(val%60).padStart(2,'0');
        return `<span class="timer-live${val<=60?' danger':''}" title="${escHtml(namaTest)}">${m}:${s}</span>`;
    }
    return '<span style="color:#ccc;font-size:12px">—</span>';
}

/* ══════════════════════════════════════════════════════
   FETCH & AUTO-REFRESH
══════════════════════════════════════════════════════ */
async function fetchAll() {
    const tbl = document.getElementById('todayTableInput').value.trim() || 'nilai1';
    const res  = await fetch(`${API_BASE}?table=${tbl}`, { headers: { 'X-Custom-Auth': AUTH_KEY } });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Gagal');
    return json.data || [];
}

function startAutoRefresh() {
    if (allInterval) clearInterval(allInterval);
    allUpdate();
    allInterval = setInterval(allUpdate, 5000);
}

async function allUpdate() {
    try {
        rawDataAll = await fetchAll();
        todayUpdateFromCache();
    } catch(e) {
        document.getElementById('todayLastUpdate').textContent = '⚠ Error';
    }
}

/* ══════════════════════════════════════════════════════
   TODAY TABLE
══════════════════════════════════════════════════════ */
function todaySearch() {
    const dateVal = document.getElementById('todayDateInput').value || todayString();
    document.getElementById('todayDateInput').value = dateVal;
    document.getElementById('todayBadgeLabel').textContent =
        dateVal === todayString() ? 'Hari Ini' : dateVal;
    if (todayTable) { todayTable.destroy(); todayTable = null; }
    document.getElementById('todayContainer').innerHTML =
        '<div class="loading-block"><div class="spinner"></div><p>Memuat...</p></div>';
    startAutoRefresh();
}

async function todayRefresh() { await allUpdate(); }

function todayUpdateFromCache() {
    const dateVal = document.getElementById('todayDateInput').value || todayString();
    const data    = rawDataAll.filter(row => getDateFromX02(row.x_02) === dateVal);

    document.getElementById('todayCount').textContent      = data.length + ' peserta';
    document.getElementById('todayLastUpdate').textContent = '🕐 ' + nowTimeString();

    if (data.length === 0) {
        if (!todayTable) {
            document.getElementById('todayContainer').innerHTML = `
                <div class="empty-msg">
                    <div class="em-icon">📭</div>
                    <p>Tidak ada peserta pada <strong>${dateVal}</strong></p>
                </div>`;
        }
        return;
    }

    const rows = data.map(row => ({
        id_x:  `<span style="font-weight:700;color:#374151">${escHtml(String(row.id_x||''))}</span>`,
        x_01:  makeTruncate(row.x_01),
        nama:  escHtml(getNamaFromX02(row.x_02)),
        skor:  `<span style="font-size:12px;color:#374151">${escHtml(formatSkor(row.x_05))}</span>`,
        timer: renderTimer(row.id_x, row.x_04 || ''),
        tgl:   `<span style="font-size:12px;color:var(--muted)">${getDateFromX02(row.x_02)}</span>`
    }));

    if (todayTable) {
        todayTable.clear(); todayTable.rows.add(rows); todayTable.draw(false);
    } else {
        todayInitTable(rows);
    }
}

function todayInitTable(rows) {
    document.getElementById('todayContainer').innerHTML = `
        <table id="todayDataTable" class="display nowrap" style="width:100%">
            <thead><tr>
                <th>ID</th><th>Token</th><th>Nama</th>
                <th>Skor</th><th>⏱ Timer</th><th>Tgl Tes</th>
            </tr></thead><tbody></tbody>
        </table>`;
    todayTable = $('#todayDataTable').DataTable({
        data: rows,
        columns: [
            { data: 'id_x' },
            { data: 'x_01' },
            { data: 'nama' },
            { data: 'skor',  orderable: false },
            { data: 'timer', orderable: false },
            { data: 'tgl',   orderable: false }
        ],
        pageLength: 25,
        lengthMenu: [[10,25,50,100,-1],[10,25,50,100,'Semua']],
        order: [[0,'desc']],
        language: {
            search: '🔍', searchPlaceholder: 'Cari...',
            lengthMenu: 'Tampilkan _MENU_',
            info: '_START_–_END_ dari _TOTAL_',
            infoEmpty: '0 data', infoFiltered: '(dari _MAX_)',
            paginate: { first:'«', last:'»', next:'›', previous:'‹' },
            zeroRecords: 'Tidak ada data', emptyTable: 'Tidak ada data'
        },
        scrollX: true
    });
}

/* ══════════════════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════════════════ */
const tooltipEl = document.getElementById('tooltipEl');
document.addEventListener('mouseover', e => {
    if (window.innerWidth < 640) return;
    const el = e.target.closest('.truncate');
    if (el) {
        tooltipEl.textContent = el.dataset.full || '';
        tooltipEl.style.display = 'block';
        const r = el.getBoundingClientRect();
        tooltipEl.style.left = r.left + 'px';
        tooltipEl.style.top  = (r.bottom + 8) + 'px';
    }
});
document.addEventListener('mouseout', e => {
    if (e.target.closest && e.target.closest('.truncate')) tooltipEl.style.display = 'none';
});

/* ══════════════════════════════════════════════════════
