<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil WWQ — Admin Psikotes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

    <style>
        :root {
            --bg:       #0d0f14;
            --surface:  #151820;
            --surface2: #1c2030;
            --border:   #2a2f3f;
            --accent:   #4fffb0;
            --accent2:  #4f8fff;
            --danger:   #ff4f6d;
            --text:     #e8eaf0;
            --muted:    #6b7280;
            --radius:   10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 28px 20px;
        }

        /* Header */
        .header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
        }
        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px; font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--accent); }
        .header .sub {
            font-size: 12px; color: var(--muted);
            margin-top: 3px; font-family: 'DM Mono', monospace;
        }
        .badge-db {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 14px;
            font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent2);
        }
        .badge-db::before {
            content: ''; width: 7px; height: 7px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .last-update { font-size: 12px; color: var(--muted); display:flex; align-items:center; gap:6px; }
        .refresh-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); display:inline-block; }

        /* Server chips (multi akun) */
        .srv-chip {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--muted); border-radius: 20px; padding: 5px 13px;
            font-size: 12px; font-family: 'DM Mono', monospace; font-weight: 500;
            cursor: pointer; transition: all .15s; white-space: nowrap;
        }
        .srv-chip:hover { border-color: var(--accent2); color: var(--text); }
        .srv-chip.active {
            background: var(--accent2); border-color: var(--accent2);
            color: #fff; font-weight: 700;
        }

        /* Stats */
        .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 14px 20px; flex: 1; min-width: 130px;
        }
        .stat-card .num {
            font-family: 'Syne', sans-serif; font-size: 28px;
            font-weight: 700; color: var(--accent); line-height: 1;
        }
        .stat-card .lbl {
            font-size: 11px; color: var(--muted); margin-top: 4px;
            text-transform: uppercase; letter-spacing: .5px;
        }

        /* Toolbar */
        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 9px 18px; border-radius: var(--radius); border: none;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500;
            transition: opacity .18s, transform .12s;
        }
        .btn:hover { opacity: .88; transform: translateY(-1px); }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

        .error-box {
            display: none; background: rgba(255,79,109,.1); border: 1px solid var(--danger);
            color: var(--danger); border-radius: var(--radius); padding: 12px 16px;
            font-size: 13px; margin-bottom: 16px;
        }

        /* Table */
        .table-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px; overflow-x: auto;
        }
        .loading-state {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            padding: 60px 0; color: var(--muted); font-size: 13px;
        }
        .spinner {
            width: 28px; height: 28px; border-radius: 50%;
            border: 3px solid var(--border); border-top-color: var(--accent2);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        table.dataTable { color: var(--text); border-collapse: collapse !important; width:100%; }
        table.dataTable thead th {
            background: var(--surface2); color: var(--text);
            border-bottom: 1px solid var(--border) !important;
            font-family: 'DM Mono', monospace; font-size: 12px;
            text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px !important;
        }
        table.dataTable tbody td {
            border-bottom: 1px solid var(--border) !important;
            padding: 10px 12px !important; font-size: 13px; vertical-align: top;
        }
        table.dataTable tbody tr:hover { background: var(--surface2); }
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate {
            color: var(--muted) !important; font-size: 12px; margin: 10px 0;
        }
        .dataTables_wrapper .dataTables_filter input,
        .dataTables_wrapper .dataTables_length select {
            background: var(--bg); border: 1px solid var(--border) !important;
            color: var(--text) !important; border-radius: 6px; padding: 4px 8px;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button {
            color: var(--text) !important; padding: 4px 10px !important;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: var(--accent2) !important; border-radius: 6px;
            color: #fff !important; border: none !important;
        }

        .kode-badge {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--accent2); border-radius: 6px; padding: 3px 10px;
            font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
            white-space: nowrap;
        }

        /* WWQ item badges */
        .wwq-wrap { display: flex; flex-wrap: wrap; gap: 4px; max-width: 720px; }
        .wwq-item {
            font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
            padding: 2px 6px; border-radius: 4px; white-space: nowrap; line-height: 1.4;
        }
        .wwq-a { background: rgba(79,143,255,.15); color: var(--accent2); border: 1px solid rgba(79,143,255,.3); }
        .wwq-b { background: rgba(79,255,176,.15); color: var(--accent); border: 1px solid rgba(79,255,176,.3); }
        .wwq-other { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
        .wwq-empty { color: var(--muted); font-size: 12px; }
        .wwq-count { font-size: 11px; color: var(--muted); margin-left: 6px; white-space: nowrap; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div>
            <h1>Hasil <span>WWQ</span></h1>
            <div class="sub">psikogram_db · tabel: <strong id="namaTableHeader" style="color:var(--accent)">nilai1_json</strong> · auto-refresh 5 detik</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <div id="srvChips" style="display:flex; gap:6px; flex-wrap:wrap;"><!-- filled by JS --></div>
            <span class="last-update"><span class="refresh-dot"></span><span id="lastUpdate">Memuat...</span></span>
            <span class="badge-db">db_psikogram1</span>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="num" id="statTotal">—</div>
            <div class="lbl">Total Peserta</div>
        </div>
        <div class="stat-card">
            <div class="num" id="statAda">—</div>
            <div class="lbl">Sudah Isi WWQ</div>
        </div>
        <div class="stat-card">
            <div class="num" id="statBelum">—</div>
            <div class="lbl">Belum Isi WWQ</div>
        </div>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox"></div>

    <!-- Toolbar -->
    <div class="toolbar">
        <button class="btn btn-secondary" onclick="loadData()">↻ Refresh Manual</button>
        <span style="font-size:12px; color:var(--muted); margin-left:auto;" id="recordCount"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <div id="tableContainer">
            <div class="loading-state">
                <div class="spinner"></div>
                <span>Memuat data dari server...</span>
            </div>
        </div>
    </div>

<script>
    // ============================================================
    // SERVER LIST — tambah / kurangi di sini saja
    // ============================================================
    const SERVERS = [
        { label: '1', domain: 'lidan-co-id.pages.dev' },
        { label: '2', domain: 'tabi.my.id'             },
        { label: '3', domain: 'mobeli.my.id'           },
        { label: '4', domain: 'talentmap.my.id'        },
    ];
    const API_PATH = '/api/db_psikogram1';
    let activeSrvIdx = 0;

    function getApiBase() { return `https://${SERVERS[activeSrvIdx].domain}${API_PATH}`; }
    Object.defineProperty(window, 'API_URL', { get: getApiBase });

    const SECRET     = 'admin';
    const REFRESH_MS = 5000;
    const TABLE_NAME = 'nilai1_json';   // tabel sumber tetap, sesuai permintaan

    let dataTable    = null;
    let refreshTimer = null;
    let lastDataHash = null;

    // ============================================================
    // SERVER SWITCHER — render chips & ganti akun/server aktif
    // ============================================================
    function renderSrvChips() {
        const wrap = document.getElementById('srvChips');
        if (!wrap) return;
        wrap.innerHTML = SERVERS.map((s, i) => `
            <button class="srv-chip${i === activeSrvIdx ? ' active' : ''}"
                onclick="switchSrcServer(${i})"
                title="https://${s.domain}">
                ${i === activeSrvIdx ? '✓ ' : ''}${s.label}
            </button>`).join('');
    }

    function switchSrcServer(idx) {
        if (idx === activeSrvIdx) return;
        activeSrvIdx = idx;
        renderSrvChips();
        lastDataHash = null;
        if (refreshTimer) clearInterval(refreshTimer);
        document.getElementById('tableContainer').innerHTML = `
            <div class="loading-state">
                <div class="spinner"></div>
                <span>Memuat data dari server baru...</span>
            </div>`;
        loadData();
        startPolling();
    }

    function safeJSON(str, def) {
        try { return JSON.parse(str) || def; } catch { return def; }
    }

    // ============================================================
    // PARSE KOLOM x_07 -> format "1:B 2:B 3:A ..."
    // ============================================================
    function parseWWQ(x07) {
        const obj = safeJSON(x07, null);
        if (!obj) return null;
        // ambil who_wwq, atau fallback ke key pertama yg ada isinya
        let raw = obj.who_wwq;
        if (raw === undefined) {
            const firstKey = Object.keys(obj)[0];
            raw = firstKey ? obj[firstKey] : '';
        }
        if (typeof raw !== 'string' || !raw.trim()) return null;

        const arr = raw.split(';').map(v => v.trim()).filter(v => v !== '');
        if (!arr.length) return null;
        return arr;
    }

    function renderWWQCell(x07) {
        const arr = parseWWQ(x07);
        if (!arr) return '<span class="wwq-empty">— belum isi —</span>';

        const items = arr.map((v, i) => {
            const cls = v === 'A' ? 'wwq-a' : (v === 'B' ? 'wwq-b' : 'wwq-other');
            return `<span class="wwq-item ${cls}">${i + 1}:${v}</span>`;
        }).join('');

        return `<div class="wwq-wrap">${items}<span class="wwq-count">(${arr.length} item)</span></div>`;
    }

    // ============================================================
    // PARSE KOLOM x_02 -> biodata (nama, usia, riwayat pendidikan)
    // ============================================================
    function renderBiodataCell(x02) {
        const bio = safeJSON(x02, null);
        if (!bio) return '<span class="wwq-empty">— data tidak ada —</span>';

        const nama   = bio.nama || bio.name || '—';
        const usia   = bio.usia ? `${bio.usia} th` : '';
        const pendUtama = bio.pendidikan || '';
        const riwayat = Array.isArray(bio.riwayatPendidikan) ? bio.riwayatPendidikan : [];

        let html = `<div style="font-weight:700;font-size:13px;">${nama}</div>`;
        if (usia) html += `<div style="font-size:11px;color:var(--muted);margin-top:1px;">${usia}</div>`;

        if (riwayat.length) {
            html += riwayat.map(r => `
                <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;line-height:1.55;">
                    <div style="color:var(--accent2);font-weight:600;">${r.lembaga || pendUtama || '—'}</div>
                    <div style="color:var(--muted);">${[r.jurusan, r.lokasi].filter(Boolean).join(' · ')}</div>
                    <div style="color:var(--muted);">${[r.periode, r.keterangan].filter(Boolean).join(' · ')}</div>
                </div>`).join('');
        } else if (pendUtama) {
            html += `<div style="font-size:11px;color:var(--muted);margin-top:3px;">${pendUtama}</div>`;
        }

        return html;
    }

    // ============================================================
    // LOAD DATA — mengikuti kontrak API terbukti (tanpa field "success",
    // pakai limit/offset karena API membatasi maksimal baris per request)
    // ============================================================
    async function loadData() {
        try {
            const LIMIT = 200;
            let allRows = [], offset = 0, total = null;

            while (true) {
                const res = await fetch(`${API_URL}?table=${TABLE_NAME}&limit=${LIMIT}&offset=${offset}`, {
                    headers: { 'X-Custom-Auth': SECRET, 'Content-Type': 'application/json' }
                });
                if (!res.ok) throw new Error(`Server error: ${res.status}`);
                const result = await res.json();
                const rows = result.data || [];

                if (rows.length === 0) break;
                allRows = allRows.concat(rows);
                if (result.total !== undefined) total = result.total;
                if (total !== null && allRows.length >= total) break;
                if (rows.length < LIMIT) break;
                offset += rows.length;
            }

            const hash = JSON.stringify(allRows);
            if (hash === lastDataHash) return; // tidak ada perubahan
            lastDataHash = hash;

            renderTable(allRows);
            updateStats(allRows);
            document.getElementById('recordCount').textContent = `${allRows.length} records`;
            document.getElementById('lastUpdate').textContent = 'Update: ' + new Date().toLocaleTimeString('id-ID');
            document.getElementById('errorBox').style.display = 'none';

        } catch (e) {
            document.getElementById('errorBox').textContent = '⚠ ' + e.message;
            document.getElementById('errorBox').style.display = 'block';
        }
    }

    function renderTable(rows) {
        const container = document.getElementById('tableContainer');

        if (dataTable) { dataTable.destroy(); dataTable = null; }

        const tableHtml = `
            <table id="wwqTable" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Kode (x_01)</th>
                        <th>Biodata & Pendidikan (x_02)</th>
                        <th>Hasil WWQ (x_07)</th>
                    </tr>
                </thead>
                <tbody>
                    ${rows.map(row => {
                        const kode = row.x_01 || '—';
                        return `<tr>
                            <td style="color:var(--muted); font-family:'DM Mono',monospace; font-size:12px;">${row.id_x}</td>
                            <td><span class="kode-badge">${kode}</span></td>
                            <td style="max-width:260px;">${renderBiodataCell(row.x_02)}</td>
                            <td>${renderWWQCell(row.x_07)}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>`;

        container.innerHTML = tableHtml;

        dataTable = $('#wwqTable').DataTable({
            pageLength: 25,
            order: [[0, 'desc']],
            language: {
                search: 'Cari:',
                lengthMenu: 'Tampilkan _MENU_ data',
                info: 'Menampilkan _START_–_END_ dari _TOTAL_ data',
                paginate: { previous: '‹', next: '›' },
                emptyTable: 'Tidak ada data',
                zeroRecords: 'Data tidak ditemukan'
            },
            columnDefs: [{ orderable: false, targets: [2, 3] }]
        });
    }

    function updateStats(rows) {
        document.getElementById('statTotal').textContent = rows.length;
        const ada = rows.filter(r => parseWWQ(r.x_07) !== null).length;
        document.getElementById('statAda').textContent = ada;
        document.getElementById('statBelum').textContent = rows.length - ada;
    }

    function startPolling() {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(loadData, REFRESH_MS);
    }

    // Init
    renderSrvChips();
    loadData();
    startPolling();
</script>
</body>
</html>
